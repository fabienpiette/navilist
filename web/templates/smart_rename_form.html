{{template "base.html" .}}
{{define "content"}}
<div class="page-title">
    <a class="back-arrow" href="/" title="Back to playlist list">&#8592;</a>
    <h2>Smart Rename</h2>
</div>

<form method="POST" action="/playlists/smart-rename/confirm">
    <div class="toolbar toolbar-sep">
        <p class="muted" style="font-size:.75rem;margin-bottom:0;">Suggested names are based on track content. Edit any name before applying.</p>
        <button type="submit" style="margin-left:auto" title="Apply all renames">rename</button>
    </div>

    <div class="table-wrap">
        <table>
            <thead>
                <tr>
                    <th>Current Name</th>
                    <th style="width:2rem;"></th>
                    <th>New Name</th>
                </tr>
            </thead>
            <tbody>
            {{range .Rows}}
            <tr>
                <td class="muted">{{.CurrentName}}</td>
                <td style="text-align:center;padding:0 .25rem;">
                    <button type="button"
                        onclick="var r=this.closest('tr');r.querySelector('[name=name]').value=r.querySelector('[name=current]').value"
                        style="background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;padding:.25rem;"
                        title="Copy current name to new name">&#8594;</button>
                </td>
                <td>
                    <input type="hidden" name="id" value="{{.ID}}">
                    <input type="hidden" name="current" value="{{.CurrentName}}">
                    {{if .Suggested}}
                    <input type="text" name="name" value="{{.Suggested}}"
                        style="width:100%;" title="Edit the suggested name">
                    {{else}}
                    <input type="text" name="name" value="{{.CurrentName}}"
                        placeholder="mixed — no suggestion" style="width:100%;"
                        title="No suggestion: playlist tracks are too mixed">
                    {{end}}
                </td>
            </tr>
            {{end}}
            </tbody>
        </table>
    </div>
</form>
{{end}}
