<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{block "title" .}}navidrome-playlists{{end}}</title>
    <link rel="stylesheet" href="/static/app.css">
    <script src="https://unpkg.com/htmx.org@2.0.4/dist/htmx.min.js" defer></script>
</head>
<body>
<main>
    <header>
        <h1>navidrome-playlists</h1>
        <nav class="tab-bar">
            <a class="tab {{if eq .ActiveTab "playlists"}}active{{end}}" href="/">Playlists</a>
            <a class="tab {{if eq .ActiveTab "import"}}active{{end}}" href="/import">Import</a>
        </nav>
        <button class="theme-toggle" onclick="toggleTheme()" title="Toggle theme">&#9680;</button>
    </header>

    <div id="toast" class="toast hidden"></div>

    <div class="content">
        {{block "content" .}}{{end}}
    </div>

    <footer>
        <span class="motto">less is better
            <a href="https://github.com/user/navidrome-playlists" target="_blank" rel="noopener" class="github" title="GitHub">
                <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor" aria-hidden="true"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
            </a>
        </span>
        <span class="stats">{{block "stats" .}}{{end}}</span>
    </footer>
</main>
<script>
function toggleTheme() {
    var html = document.documentElement;
    html.dataset.theme = html.dataset.theme === 'dark' ? 'light' : 'dark';
    localStorage.setItem('theme', html.dataset.theme);
}
(function() {
    var t = localStorage.getItem('theme');
    if (t) document.documentElement.dataset.theme = t;
})();
document.addEventListener('htmx:afterRequest', function(e) {
    var trigger = e.detail.xhr.getResponseHeader('HX-Trigger');
    if (!trigger) return;
    try {
        var data = JSON.parse(trigger);
        if (data.showToast) {
            var toast = document.getElementById('toast');
            toast.textContent = data.showToast;
            toast.classList.remove('hidden');
            setTimeout(function() { toast.classList.add('hidden'); }, 3000);
        }
    } catch(ex) {}
});

function addTrack(id, title, artist, album) {
    var tbody = document.querySelector('#track-list tbody');
    if (!tbody) return;
    var n = tbody.rows.length + 1;
    var tr = document.createElement('tr');

    var tdN = document.createElement('td');
    tdN.className = 'mono';
    tdN.textContent = String(n);

    var tdTitle = document.createElement('td');
    tdTitle.textContent = title;

    var tdArtist = document.createElement('td');
    tdArtist.className = 'muted';
    tdArtist.textContent = artist;

    var tdAlbum = document.createElement('td');
    tdAlbum.className = 'muted';
    tdAlbum.textContent = album;

    var hidden = document.createElement('input');
    hidden.type = 'hidden';
    hidden.name = 'song_id';
    hidden.value = id;

    var btn = document.createElement('button');
    btn.type = 'button';
    btn.className = 'action-btn danger';
    btn.textContent = '\u00d7';
    btn.addEventListener('click', function() { tr.remove(); });

    var tdAction = document.createElement('td');
    tdAction.appendChild(hidden);
    tdAction.appendChild(btn);

    tr.appendChild(tdN);
    tr.appendChild(tdTitle);
    tr.appendChild(tdArtist);
    tr.appendChild(tdAlbum);
    tr.appendChild(tdAction);
    tbody.appendChild(tr);

    var results = document.getElementById('search-results');
    if (results) results.textContent = '';
    var searchInput = document.getElementById('search-input');
    if (searchInput) searchInput.value = '';
}
</script>
</body>
</html>
